            });

            sorted.forEach(function(item) {
                html += '<li class="list-group-item d-flex flex-wrap align-items-start gap-2">' +
                    '<span class="badge bg-danger bg-opacity-75 text-white" style="min-width:90px;">' +
                    item.date + '</span>' +
                    '<span>' + escapeHtml(item.title) + '</span>' +

            });
            html += '</ul>';
            container.innerHTML = html;

        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/[&<>"]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return m;
            });
        }

        // 渲染表格
        function renderTable() {
            var tbody = document.getElementById('resultBody');

            var total = filteredData.length;
            var totalPages = Math.max(1, Math.ceil(total / pageSize));
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;
            var start = (currentPage - 1) * pageSize;
            var end = Math.min(start + pageSize, total);
            var pageItems = filteredData.slice(start, end);

            count.textContent = total + ' 筆';
            pageInfo.textContent = '第 ' + currentPage + ' / ' + totalPages + ' 頁';

                tbody.innerHTML = '<tr><td colspan="6" class="no-result">查無符合資料</td></tr>';

            var html = '';

                    '<td><span class="badge ' + sourceBadge + '">' + escapeHtml(item.source) + '</span></td>' +
                    '</tr>';
            });
            tbody.innerHTML = html;
            updatePagination(totalPages);

                        d.product.toLowerCase().includes(keyword) ||
                        d.batch.toLowerCase().includes(keyword);
                });
                filteredData = temp;
            }

            // 排序
            sortData(currentSort.key, currentSort.asc);
            currentPage = 1;
            renderTable();
        }

        // 排序
        function sortData(key, asc) {
            filteredData.sort(function(a, b) {
                var va = (a[key] || '').toLowerCase();
                var vb = (b[key] || '').toLowerCase();
                if (va < vb) return asc ? -1 : 1;
                if (va > vb) return asc ? 1 : -1;
                return 0;
            });
        }

        // ================================================================
        //  3. 事件綁定 (使用 jQuery)
        // ================================================================
        $(document).ready(function() {

            // 渲染新聞
            renderNews();

            // 預設顯示全部（空關鍵字）
            filteredData = currentData.slice();
            sortData('company', true);
            renderTable();

            // Tab 切換
            $('[data-tab]').on('click', function(e) {
                e.preventDefault();
                var tab = $(this).data('tab');
                $('.tab-pane').hide();
                $('#tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).show();
                $('[data-tab]').removeClass('active');
                $(this).addClass('active');
            });

            // 搜尋按鈕
            $('#searchBtn').on('click', function() {
                var type = $('#searchType').val();
                var keyword = $('#searchKeyword').val();
                filterData(type, keyword, currentSource);
            });

            // Enter 鍵搜尋
            $('#searchKeyword').on('keyup', function(e) {
                if (e.key === 'Enter') {
                    $('#searchBtn').click();
                }
            });

            // 來源 badge 點擊
            $('.source-badge').on('click', function() {
                $('.source-badge').removeClass('active');
                $(this).addClass('active');
                currentSource = $(this).data('source');
                var type = $('#searchType').val();
                var keyword = $('#searchKeyword').val();
                filterData(type, keyword, currentSource);
            });

            // 重設按鈕
            $('#resetBtn').on('click', function() {
                $('#searchKeyword').val('');
                $('#searchType').val('keyword');
                $('.source-badge').removeClass('active');
                $('.source-badge[data-source="all"]').addClass('active');
                currentSource = 'all';
                filteredData = currentData.slice();
                sortData('company', true);
                currentPage = 1;
                renderTable();
            });

            // 分頁
            $(document).on('click', '#pagination a', function(e) {
                e.preventDefault();
                var action = $(this).data('page');
                var total = filteredData.length;
                var totalPages = Math.max(1, Math.ceil(total / pageSize));
                if (action === 'prev' && currentPage > 1) {
                    currentPage--;
                    renderTable();
                }
                if (action === 'next' && currentPage < totalPages) {
                    currentPage++;
                    renderTable();
                }
            });

            // 排序表頭
            $('#resultTable th').on('click', function() {
                var key = $(this).data('sort');
                if (!key) return;
                if (currentSort.key === key) {
                    currentSort.asc = !currentSort.asc;
                } else {
                    currentSort.key = key;
                    currentSort.asc = true;
                }
                sortData(currentSort.key, currentSort.asc);
                currentPage = 1;
                renderTable();
            });

            // 更新時間
            $('#updateTime').text('更新: ' + DATA.meta.last_updated);

        }); // end document.ready
    </script>

</body>
</html>
